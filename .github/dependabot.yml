version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      production:
        dependency-type: production
      development:
        dependency-type: development
        exclude-patterns:
          - '@types/*'
      type-definitions:
        patterns:
          - '@types/*'
    open-pull-requests-limit: 20

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - '*'
